name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Check syntax (py_compile)
        run: python -m py_compile app.py runtime.py config/settings.py

  generate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4-nano
          PLACID_API_TOKEN: ${{ secrets.PLACID_API_TOKEN }}
          PLACID_BASE_URL: https://api.placid.app/api/rest
        run: python app.py generate --topic "Faith and resilience"

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Start web server (smoke test)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PLACID_API_TOKEN: ${{ secrets.PLACID_API_TOKEN }}
          PLACID_BASE_URL: https://api.placid.app/api/rest
          OPENAI_MODEL: gpt-5.4-nano
        run: |
          timeout 10 uvicorn web.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/ || exit 1
